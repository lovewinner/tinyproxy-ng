version: '3.8'

services:
  proxy-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: tinyproxy-ng:latest
    container_name: tinyproxy-ng
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-26128}:26128"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - proxy-stats:/app/stats.json
      - proxy-logs:/app/logs
    environment:
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=${PROXY_PORT:-26128}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - USERNAME=${USERNAME:-lovewinner}
      - PASSWORD=${PASSWORD:-ncepu@6868}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-500}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); result=s.connect_ex(('127.0.0.1', 26128)); s.close(); exit(0 if result==0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - proxy-network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: tinyproxy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - proxy-network
    profiles:
      - monitoring

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: tinyproxy-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    networks:
      - proxy-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  proxy-stats:
    driver: local
  proxy-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  proxy-network:
    driver: bridge
