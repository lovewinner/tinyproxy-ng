apiVersion: v1
kind: Namespace
metadata:
  name: tinyproxy
---
apiVersion: v1
kind: Secret
metadata:
  name: tinyproxy-credentials
  namespace: tinyproxy
type: Opaque
stringData:
  username: "lovewinner"
  password: "ncepu@6868"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tinyproxy-config
  namespace: tinyproxy
data:
  config.yaml: |
    host: 0.0.0.0
    port: 26128
    auth_enabled: true
    max_connections: 500
    tunnel_idle_timeout: 180
    max_tunnel_lifetime: 300
    max_tunnel_lifetime_download: 7200
    download_hosts:
      - "*.github.com"
      - "objects.githubusercontent.com"
      - "raw.githubusercontent.com"
      - "*.githubusercontent.com"
    max_body_size: 104857600
    header_timeout: 15
    drain_timeout: 30
    keepalive_timeout: 30
    rate_limit_enabled: false
    rate_limit_per_minute: 300
    dns_cache_ttl: 300
    stats_interval: 3600
    stats_file: /app/stats.json
    display_interval: 0
    log_level: INFO
    log_file: /app/logs/proxy.log
    gh_mirror_enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyproxy-ng
  namespace: tinyproxy
  labels:
    app: tinyproxy-ng
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tinyproxy-ng
  template:
    metadata:
      labels:
        app: tinyproxy-ng
    spec:
      containers:
      - name: proxy
        image: tinyproxy-ng:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 26128
          name: proxy
          protocol: TCP
        env:
        - name: PROXY_HOST
          value: "0.0.0.0"
        - name: PROXY_PORT
          value: "26128"
        - name: AUTH_ENABLED
          value: "true"
        - name: USERNAME
          valueFrom:
            secretKeyRef:
              name: tinyproxy-credentials
              key: username
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: tinyproxy-credentials
              key: password
        - name: LOG_LEVEL
          value: "INFO"
        - name: MAX_CONNECTIONS
          value: "500"
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: stats
          mountPath: /app/stats.json
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 26128
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 26128
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: tinyproxy-config
      - name: stats
        emptyDir: {}
      - name: logs
        emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: tinyproxy-ng
  namespace: tinyproxy
spec:
  type: LoadBalancer
  selector:
    app: tinyproxy-ng
  ports:
  - port: 26128
    targetPort: 26128
    protocol: TCP
    name: proxy
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tinyproxy-network-policy
  namespace: tinyproxy
spec:
  podSelector:
    matchLabels:
      app: tinyproxy-ng
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from: []
    ports:
    - protocol: TCP
      port: 26128
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
